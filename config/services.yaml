services:
    MambaAi\DefaultStreamMapper: ~

    MambaAi\StreamMapperInterface: '@MambaAi\DefaultStreamMapper'

    MambaAi\AgentKernel:
        arguments:
            - '@event_dispatcher'
            - '@MambaAi\Channel\ChannelResolverInterface'
            - '@MambaAi\AgentResolverInterface'
            - '@MambaAi\PromptBuilderInterface'
            - '@MambaAi\StreamMapperInterface'

    MambaAi\AgentLoader:
        arguments:
            $builder: '@MambaAi\AgentBuilderInterface'
            $agentsDir: '%mamba_ai.agents_dir%'

    MambaAi\AgentResolver:
        arguments:
            $loader: '@MambaAi\AgentLoaderInterface'

    MambaAi\PromptBuilder:
        arguments:
            $dispatcher: '@event_dispatcher'
            $systemParts: !tagged_iterator mamba_ai.system_prompt_part
            $userParts: !tagged_iterator mamba_ai.user_prompt_part

    # --- Default system prompt parts ---
    MambaAi\Prompt\Part\AgentSystemPart:
        tags:
            - { name: mamba_ai.system_prompt_part, priority: 300 }

    MambaAi\Prompt\Part\SoulSystemPart:
        tags:
            - { name: mamba_ai.system_prompt_part, priority: 200 }

    MambaAi\Prompt\Part\KnowledgeSystemPart:
        tags:
            - { name: mamba_ai.system_prompt_part, priority: 100 }

    MambaAi\Prompt\Part\ProjectInstructionsContextPart:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags:
            - { name: mamba_ai.system_prompt_part, priority: 95 }

    MambaAi\Prompt\Part\EnvironmentSystemPart:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags:
            - { name: mamba_ai.system_prompt_part, priority: 90 }

    MambaAi\Prompt\Part\GitStatusContextPart:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags:
            - { name: mamba_ai.system_prompt_part, priority: 85 }

    MambaAi\Prompt\Part\DirectoryStructureContextPart:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags:
            - { name: mamba_ai.system_prompt_part, priority: 80 }

    MambaAi\Prompt\Part\MemorySystemPart:
        tags:
            - { name: mamba_ai.system_prompt_part, priority: 75 }

    MambaAi\Prompt\Part\ReadmeContextPart:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags:
            - { name: mamba_ai.system_prompt_part, priority: 70 }

    MambaAi\Prompt\Part\ConversationHistoryPart:
        tags:
            - { name: mamba_ai.system_prompt_part, priority: 60 }

    MambaAi\Prompt\Part\SkillsSystemPart:
        tags:
            - { name: mamba_ai.system_prompt_part, priority: 50 }

    MambaAi\Prompt\Part\MemoryInstructionSystemPart:
        tags:
            - { name: mamba_ai.system_prompt_part, priority: 25 }

    # --- Default user prompt parts ---
    MambaAi\Prompt\Part\MessageContentPart:
        tags:
            - { name: mamba_ai.user_prompt_part, priority: 200 }

    MambaAi\Prompt\Part\CurrentDatePart:
        tags:
            - { name: mamba_ai.system_prompt_part, priority: 20 }

    MambaAi\Message\MambaAIMessageHandler:
        arguments:
            $agentKernel: '@MambaAi\AgentKernel'
            $channelResolver: '@MambaAi\Channel\ChannelResolverInterface'
        tags:
            - { name: messenger.message_handler }

    MambaAi\Controller\MambaAIController:
        arguments:
            $eventDispatcher: '@event_dispatcher'
            $messageBus: '@Symfony\Component\Messenger\MessageBusInterface'
        tags:
            - { name: controller.service_arguments }

    MambaAi\EventListener\ConversationHistoryListener:
        tags:
            - { name: kernel.event_listener, event: MambaAi\Event\TerminateEvent }

    MambaAi\Channel\CliChannel:
        tags:
            - { name: mamba_ai.channel }

    MambaAi\Channel\ChannelResolver:
        arguments:
            - !tagged_iterator mamba_ai.channel

    MambaAi\Command\ChatCommand:
        arguments:
            $kernel: '@MambaAi\AgentKernel'
            $agentResolver: '@MambaAi\AgentResolverInterface'
            $agentLoader: '@MambaAi\AgentLoaderInterface'
        tags:
            - { name: console.command }

    MambaAi\Command\WelcomeCommand:
        arguments:
            $agentsDir: '%mamba_ai.agents_dir%'
            $projectDir: '%kernel.project_dir%'
        tags:
            - { name: console.command }

    MambaAi\Command\SetupCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags:
            - { name: console.command }

    MambaAi\Command\AgentCreateCommand:
        arguments:
            $agentsDir: '%mamba_ai.agents_dir%'
        tags:
            - { name: console.command }

